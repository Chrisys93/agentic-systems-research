{{- if .Values.mlflow.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "code-doc-assistant.fullname" . }}-mlflow
  labels:
    {{- include "code-doc-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  serviceName: {{ include "code-doc-assistant.fullname" . }}-mlflow
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
      app.kubernetes.io/component: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
        app.kubernetes.io/component: mlflow
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mlflow.service.port }}
              name: http
          args:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port={{ .Values.mlflow.service.port | quote }}
            - --backend-store-uri={{ .Values.mlflow.backendStoreUri }}
            - --default-artifact-root={{ .Values.mlflow.defaultArtifactRoot }}
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  {{- if .Values.mlflow.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: mlflow-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mlflow.persistence.storageClass }}
        storageClassName: {{ .Values.mlflow.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mlflow.persistence.size }}
  {{- end }}
{{- end }}
