{{- if eq .Values.inferenceBackend "vllm" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "code-doc-assistant.fullname" . }}-vllm
  labels:
    {{- include "code-doc-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
      app.kubernetes.io/component: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
        app.kubernetes.io/component: vllm
    spec:
      containers:
        - name: vllm
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.vllm.service.port }}
              name: http
          args:
            - "--model"
            - "{{ if .Values.vllm.model }}{{ .Values.vllm.model }}{{ else }}{{ include "code-doc-assistant.ollamaModel" . }}{{ end }}"
            - "--tensor-parallel-size"
            - {{ .Values.vllm.tensorParallelSize | quote }}
            - "--max-model-len"
            - {{ .Values.vllm.maxModelLen | quote }}
            - "--gpu-memory-utilization"
            - {{ .Values.vllm.gpuMemoryUtilization | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "12Gi"
              cpu: "2"
              nvidia.com/gpu: "1"
            limits:
              memory: "24Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
{{- end }}
